<!DOCTYPE html>
<html>
<body>

<h2>Edit Expense</h2>

<form method="POST">
    <input type="text" name="title" value="{{ data[1] }}">
    <input type="number" name="amount" value="{{ data[2] }}">
    <input type="text" name="category" value="{{ data[3] }}">
    <input type="date" name="date" value="{{ data[4] }}">
    <button>Update</button>
</form>

</body>
</html>
